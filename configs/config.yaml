active_mode: full

app:
  name: multimodal-recsys
  random_seed: 42

modes:
  dev:
    products: 5000
    users: 1000
    events: 50000
  full:
    products: 50000
    users: 10000
    events: 1000000

server:
  api_port: 8000
  dashboard_port: 8501

redis:
  host: redis
  port: 6379
  db: 0

monitoring:
  hitrate_threshold: 0.20
  ctr_threshold: 0.03
  ctr_min_logs: 100
  new_logs_threshold: 10000

logging:
  live_events:
    max_file_mb: 100
    rotate_daily: true

paths:
  data_dir: data/
  artifacts_dir: artifacts/

search:
  encoder_type: clip
  clip_model: openai/clip-vit-base-patch32
  embedding_dim: 512
  index_type: hnsw
  top_k: 10
  max_top_k: 100
  hybrid_text_weight: 0.55
  allow_fallback_encoder: false
  query_prior_top_k: 10
  query_prior_boost: 50.0
  query_prior_holdout_count: 0
  query_token_prior_top_k: 1200
  query_token_prior_boost: 16.0
  query_token_prior_candidate_multiplier: 30
  query_token_prior_candidate_floor: 200
  query_token_prior_holdout_count: 0
  query_token_prior_exclude_holdout_query_keys: false
  lexical_candidate_expansion: false
  query_behavior_model_path: artifacts/search/query_behavior_model.json.gz
  query_behavior_model_required: true
  query_embedding_cache_path: artifacts/search/query_embedding_cache.npz
  qrels_prior_train_only: true
  qrels_split_seed: 42
  qrels_train_ratio: 0.8
  qrels_valid_ratio: 0.1
  online_learning:
    enabled: true
    # Keep live search feedback tooling available, but do not block the CT worker
    # on search behavior-model refresh during the default submission demo.
    auto_refresh: false
    promote_on_pass: true
    feedback_path: data/processed/search_feedback.parquet
    validation_ratio: 0.2
    max_eval_queries: 5000
    max_mrr_drop: 0.002
    max_ndcg_drop: 0.002
    max_latency_p95_ms: 200.0
    weight_multiplier: 1.0
    min_positive_weight: 1.0
    max_query_product_weight: 25

search_labels:
  source: microsoft_hnm_search
  queries_path: data/external/hnm_search/raw/queries.csv
  qrels_path: data/external/hnm_search/raw/qrels.csv
  include_negatives: true

evaluation:
  search_sample: all
  recommendation_sample: 400
  search_primary: supervised_qrels_test_split
  search_qrels_split: test

recommendation:
  candidate_k: 300
  final_top_n: 10
  embedding_dim: 128
  exploration_slots: 2
  max_same_category_streak: 2
  session_recent_n: 20
  long_term_weight: 0.7
  session_weight: 0.3
  strategies:
    # Live A/B mapping:
    #   control bucket   -> rank-only control
    #   treatment bucket -> transition/exploration treatment
    baseline_vanilla:
      label: BaselineVanilla
      current_category_slots: 0
      transition_slots: 0
      long_term_slots: 0
      exploration_slots: 2
      long_term_weight: 0.7
      session_weight: 0.3
      transition_boost: 0.0
      adaptive_gate: false
      adaptive_margin: 0.15
    control:
      label: RankOnlyControl
      current_category_slots: 0
      transition_slots: 0
      long_term_slots: 10
      exploration_slots: 0
      long_term_weight: 1.0
      session_weight: 0.0
      transition_boost: 0.0
      adaptive_gate: false
      adaptive_margin: 0.15
    treatment:
      label: ComplementGraphExplore
      current_category_slots: 6
      transition_slots: 2
      long_term_slots: 1
      exploration_slots: 3
      long_term_weight: 0.55
      session_weight: 0.45
      transition_boost: 0.8
      adaptive_gate: false
      adaptive_margin: 0.15
  two_tower_max_positive_samples: 4000
  ranker_max_samples: 20000
  session_encoder_max_samples: 4000
  ct_training:
    lightweight_live_refresh: true
    live_refresh_max_events: 50000
    two_tower_max_positive_samples: 1000
    ranker_max_samples: 5000
    session_encoder_max_samples: 1000
    skip_full_evaluation: true

simulator:
  output_format: csv

  output:
    raw_dir: data/raw
    products_file: products.csv
    users_file: users.csv
    events_file: events.csv

  scale:
    users: 10000
    events: 1000000

  target_scale:
    users: 10000
    events: 1000000

  preference_noise:
    mode: blend_uniform
    strength: 0.18

  user_preference:
    top_k_categories: 2

  budget_adjustment_by_tier:
    low_price:
      min_multiplier: 0.90
      max_multiplier: 0.90
      min_floor: 10000
      max_floor: 120000
    mid_price:
      min_multiplier: 1.00
      max_multiplier: 1.00
      min_floor: 30000
      max_floor: 300000
    luxury:
      min_multiplier: 2.50
      max_multiplier: 5.00
      min_floor: 300000
      max_floor: 2500000

  catalog:
    source: external_hm

    external_hm:
      products_master_path: data/external/hm/processed/hm_products_master_clean_50k.csv
      low_price_max_quantile: 0.55
      mid_price_max_quantile: 0.97
      new_item_days_threshold: 7
      allowed_top_categories: [Ladieswear, Baby/Children, Divided, Menswear, Sport]

  personas:
    # Trend-sensitive users prefer Divided/Ladieswear/Sport and accept higher prices.
    trendsetter:
      ratio: 0.12
      distribution_mode: prior_based
      category_prior:
        Divided: 0.40
        Ladieswear: 0.25
        Sport: 0.20
        Menswear: 0.10
        Baby/Children: 0.05
      price_sensitivity: 0.30
      base_conversion_rate: 0.07
      preferred_price_tiers: [mid_price, luxury]
      budget_min: 50000
      budget_max: 300000

    # Pragmatists balance practical categories and price.
    pragmatist:
      ratio: 0.20
      distribution_mode: price_based
      affordability_alpha: 0.70
      price_sensitivity: 0.55
      base_conversion_rate: 0.05
      preferred_price_tiers: [low_price, mid_price]
      budget_min: 30000
      budget_max: 150000

    # Value seekers strongly prefer lower-price items.
    value_seeker:
      ratio: 0.22
      distribution_mode: price_based
      affordability_alpha: 1.20
      price_sensitivity: 0.90
      base_conversion_rate: 0.04
      preferred_price_tiers: [low_price]
      budget_min: 10000
      budget_max: 100000

    # H&M does not provide a stable brand column, so brand loyalty is represented
    # as top-category loyalty.
    top_category_loyalist:
      ratio: 0.14
      distribution_mode: top_category_anchor
      preferred_top_category_pool: [Ladieswear, Baby/Children, Divided, Menswear, Sport]
      price_sensitivity: 0.35
      base_conversion_rate: 0.08
      preferred_price_tiers: []
      budget_min: 80000
      budget_max: 500000

    # Impulse buyers have higher cart and direct-purchase probabilities.
    impulse_buyer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior:
        Ladieswear: 0.30
        Divided: 0.30
        Sport: 0.20
        Menswear: 0.15
        Baby/Children: 0.05
      price_sensitivity: 0.35
      base_conversion_rate: 0.09
      preferred_price_tiers: [mid_price]
      budget_min: 40000
      budget_max: 200000

    # Careful explorers browse more items and convert less often.
    careful_explorer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior:
        Ladieswear: 0.24
        Baby/Children: 0.18
        Divided: 0.18
        Menswear: 0.20
        Sport: 0.20
      price_sensitivity: 0.60
      base_conversion_rate: 0.03
      preferred_price_tiers: [low_price, mid_price]
      budget_min: 20000
      budget_max: 160000

  events:
    lookback_days: 30
    budget_tolerance_multiplier: 1.25
    query_anchor_exact_leaf_prob: 0.90
    query_anchor_color_prob: 0.85
    query_anchor_name_prob: 0.55
    search_result_popularity_strength: 2.50

    query_pool:
      Ladieswear: [Dress, Trousers, Sweater, Blouse, Top, Bra, Skirt, Jacket]
      Baby/Children: [Trousers, T-shirt, Sweater, Dress, Shorts, Jacket, Garment Set, Leggings/Tights]
      Divided: [Dress, Sweater, Trousers, T-shirt, Skirt, Vest top, Jacket, Blouse]
      Menswear: [Trousers, Sweater, T-shirt, Shirt, Shorts, Hoodie, Jacket, Polo shirt]
      Sport: [T-shirt, Leggings/Tights, Vest top, Trousers, Bra, Shorts, Top, Hoodie]

    # Retailrocket-derived transition priors:
    #   view_to_cart ~= 0.0221
    #   cart_to_purchase ~= 0.2717
    #   direct_purchase_from_view ~= 0.0010
    # The final values below apply persona-specific calibration on top of those
    # priors so that each persona has a distinct browsing/conversion pattern.
    transition_prob:
      trendsetter:
        view_to_cart: 0.075
        cart_to_purchase: 0.350
        direct_purchase_from_view: 0.007

      pragmatist:
        view_to_cart: 0.045
        cart_to_purchase: 0.290
        direct_purchase_from_view: 0.003

      value_seeker:
        view_to_cart: 0.038
        cart_to_purchase: 0.245
        direct_purchase_from_view: 0.002

      top_category_loyalist:
        view_to_cart: 0.070
        cart_to_purchase: 0.370
        direct_purchase_from_view: 0.006

      impulse_buyer:
        view_to_cart: 0.095
        cart_to_purchase: 0.420
        direct_purchase_from_view: 0.012

      careful_explorer:
        view_to_cart: 0.028
        cart_to_purchase: 0.205
        direct_purchase_from_view: 0.0015

    views_per_session_by_persona:
      trendsetter: [3, 5]
      pragmatist: [1, 3]
      value_seeker: [2, 4]
      top_category_loyalist: [2, 4]
      impulse_buyer: [1, 3]
      careful_explorer: [4, 6]

  split:
    train_ratio: 0.8
    valid_ratio: 0.1
    test_ratio: 0.1
    time_based: true
