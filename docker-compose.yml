# Bootstrap prepares processed data, search/recommendation artifacts, reports,
# and the active model registry before API/dashboard/worker services start.

x-app-mount: &app_mount ./:/app
x-data-mount: &data_mount ${MARS_HOST_DATA_DIR:-./data}:/app/data
x-huggingface-cache-mount: &huggingface_cache_mount ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface

services:
  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mars-bootstrap
    environment:
      # Submission default is full scale.
      MARS_MODE: full
      MARS_CONFIG: /app/configs/config.yaml
      # Allow a fresh machine to download CLIP if the Hugging Face cache is empty.
      MARS_CLIP_LOCAL_FILES_ONLY: "0"
    command: ["python", "-m", "scripts.runtime.bootstrap_runtime", "--config", "configs/config.yaml", "--mode", "full", "--reuse-existing-artifacts", "--register"]
    volumes:
      - *app_mount
      - *data_mount
      - *huggingface_cache_mount

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mars-api
    ports:
      - "8000:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      MARS_MODE: full
      MARS_CONFIG: /app/configs/config.yaml
      MARS_CLIP_LOCAL_FILES_ONLY: "0"
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - *app_mount
      - *data_mount
      - *huggingface_cache_mount

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mars-dashboard
    ports:
      - "8501:8501"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started
    environment:
      API_BASE_URL: http://api:8000
      MARS_MODE: full
      MARS_CONFIG: /app/configs/config.yaml
    command: ["streamlit", "run", "apps/dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    volumes:
      - *app_mount
      - *data_mount

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mars-simulator
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started
    environment:
      API_BASE_URL: http://api:8000
      MARS_MODE: full
      MARS_CONFIG: /app/configs/config.yaml
    command: ["python", "-m", "apps.simulator.main", "--config", "configs/config.yaml", "--mode", "full", "--api-base-url", "http://api:8000", "--source", "generate", "--interval", "1.0", "--batch-size", "1", "--traffic-jitter", "1.0", "--top-k", "5", "--top-n", "5", "--startup-timeout", "600"]
    restart: on-failure
    volumes:
      - *app_mount
      - *data_mount

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mars-worker
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      MARS_MODE: full
      MARS_CONFIG: /app/configs/config.yaml
      MARS_CLIP_LOCAL_FILES_ONLY: "0"
    command: ["python", "-m", "apps.worker.main", "--config", "configs/config.yaml", "--mode", "full", "--interval", "10", "--logs", "logs/api_events.jsonl", "--source-key", "api_events_jsonl"]
    volumes:
      - *app_mount
      - *data_mount
      - *huggingface_cache_mount

  redis:
    image: redis:7
    container_name: mars-redis
    ports:
      - "6379:6379"
